[build]
builder      = "nixpacks"
buildCommand = "npm install && cd client && npm install && npm run build"

[deploy]
# Run schema migration first (idempotent -- safe to repeat on every deploy).
# The migration process exits cleanly before the server starts.
startCommand        = "node src/db/migrate.js && node src/index.js"
healthcheckPath     = "/health"
healthcheckTimeout  = 300
restartPolicyType   = "on_failure"
restartPolicyMaxRetries = 10
